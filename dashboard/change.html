<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pl-pipeline · Change Detail</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234f6bff'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='sans-serif' font-size='15' font-weight='800'%3Epl%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-brand-mark">pl</div>
    <span id="brand-title">pl-pipeline Dashboard</span>
    <span class="nav-meta" style="margin-left: 12px;" id="brand-meta"></span>
    <span id="live-badge-slot"></span>
  </div>
  <button class="theme-toggle" id="theme-toggle" title="切换主题">
    <span id="theme-icon">☀</span>
  </button>
</nav>

<div class="page">
  <a class="back-link" href="index.html">← Back to list</a>
  <h1 class="page-title" id="change-title">loading…</h1>
  <p class="page-sub" id="change-sub"></p>

  <div class="info-grid" id="info-grid"></div>

  <div class="stage-row" id="stage-row"></div>

  <!-- v1.7.3: Contract drill-down 卡片，端点不可用或本 change 没 pact 时整个不渲染 -->
  <section id="contract-section" style="display:none; margin: 24px 0 8px 0;"></section>

  <div class="timeline-head">
    <h2>Timeline <span class="muted" id="event-count"></span></h2>
    <div class="timeline-filter">
      <label><input type="checkbox" id="flt-artifact" checked> artifact.*</label>
      <label><input type="checkbox" id="flt-business" checked> business</label>
      <label><input type="checkbox" id="flt-gate" checked> gate/check</label>
    </div>
  </div>

  <div id="events" class="events"></div>
</div>

<script type="module">
import { parseJSONL, aggregateChange, STAGES, stageStatus, renderEvent, isCritical, fmtTs } from './assets/parser.js';
import { initTheme } from './assets/theme.js';
import { probeLiveReload, subscribeChange, mountStatusBadge } from './assets/live.js';

initTheme();

const params = new URLSearchParams(location.search);
const changeId = params.get('id');

if (!changeId) {
  document.getElementById('change-title').textContent = 'no change id';
  throw new Error('missing id');
}

// ─── 全局事件缓冲区（live reload 增量源） ─────────────────────────────
let allEvents = [];   // 有序：旧→新
let liveMode = false;
const badge = mountStatusBadge(document.getElementById('live-badge-slot'));

async function loadIndex() {
  const resp = await fetch('./_data.json');
  if (!resp.ok) return { changes: [] };
  return await resp.json();
}

async function loadEvents(path) {
  const resp = await fetch(path);
  if (!resp.ok) return [];
  return parseJSONL(await resp.text());
}

function renderStagePipeline(agg) {
  return STAGES.map((s, i) => {
    const status = stageStatus(agg, s);
    const arrow = i < STAGES.length - 1 ? '<div class="stage-arrow"></div>' : '';
    return `
      <div class="stage-step ${status}">
        <div class="stage-dot">${status === 'done' ? '✓' : status === 'blocked' ? '✗' : ''}</div>
        <div class="stage-label">${s}</div>
      </div>${arrow}
    `;
  }).join('');
}

function renderInfoCards(agg) {
  const gateText = agg.gate_status.toLowerCase();
  return `
    <div class="info-card">
      <div class="info-label">Stage</div>
      <div class="info-value">${agg.stage}</div>
    </div>
    <div class="info-card">
      <div class="info-label">Gate</div>
      <div class="info-value" style="color:${agg.gate_status==='BLOCKED'?'var(--red)':agg.gate_status==='PASSED'?'var(--green)':''}">${gateText}</div>
    </div>
    <div class="info-card">
      <div class="info-label">Tasks</div>
      <div class="info-value">${agg.tasks_done}/${agg.tasks_total}</div>
    </div>
    <div class="info-card">
      <div class="info-label">Events</div>
      <div class="info-value">${agg.total_events}</div>
    </div>
  `;
}

// ─── v1.7.3: Contract drill-down 渲染 ───────────────────────────────
let contractDetail = null;       // 最近一次 fetch 的完整 detail 报告
let contractCopyTimers = {};      // 复制按钮反馈用的 setTimeout 句柄

async function refreshContractDetail() {
  try {
    const url = `/_data/contract-detail.json?change=${encodeURIComponent(changeId)}`;
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) { contractDetail = null; return; }
    contractDetail = await resp.json();
  } catch {
    contractDetail = null;
  }
}

function statusBadgeContract(status) {
  if (status === 'broken')   return '<span class="badge badge-red">✗ broken</span>';
  if (status === 'warn')     return '<span class="badge badge-yellow">! warn</span>';
  if (status === 'satisfied')return '<span class="badge badge-green">✓ satisfied</span>';
  return `<span class="badge badge-gray">${status || 'unknown'}</span>`;
}

function escapeHTML(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function copyToClipboard(text, buttonId) {
  // 双层 fallback：
  //   1) 优先 navigator.clipboard.writeText（HTTPS / 现代浏览器 + focused document）
  //   2) reject 或 unavailable → 退到 execCommand('copy') + 隐藏 textarea（headless / 旧浏览器）
  function execFallback() {
    return new Promise((res, rej) => {
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed'; ta.style.left = '-9999px'; ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        ok ? res() : rej(new Error('execCommand copy returned false'));
      } catch (e) { rej(e); }
    });
  }
  const primary = (navigator.clipboard && navigator.clipboard.writeText)
    ? navigator.clipboard.writeText(text)
    : Promise.reject(new Error('clipboard API unavailable'));
  primary
    .catch(() => execFallback())
    .then(() => flashCopied(buttonId, '✓ copied'))
    .catch(() => flashCopied(buttonId, '✗ copy failed'));
}
function flashCopied(buttonId, msg) {
  const btn = document.getElementById(buttonId);
  if (!btn) return;
  if (!btn.dataset.origText) btn.dataset.origText = btn.textContent;
  btn.textContent = msg;
  btn.dataset.copied = '1';
  if (contractCopyTimers[buttonId]) clearTimeout(contractCopyTimers[buttonId]);
  contractCopyTimers[buttonId] = setTimeout(() => {
    btn.textContent = btn.dataset.origText;
    delete btn.dataset.copied;
  }, 1400);
}
window.copyToClipboard = copyToClipboard;

function rowsHTML(items, severity) {
  // severity: 'error' | 'warn' | 'ok'
  if (!items || items.length === 0) return '';
  const cls = severity === 'error' ? 'badge-red' : (severity === 'warn' ? 'badge-yellow' : 'badge-gray');
  return items.map((it, i) => {
    const reason = it.reason ? `<div class="muted" style="font-size:12px; margin-top:4px; line-height:1.4">${escapeHTML(it.reason)}</div>` : '';
    const path = it.source_path || '';
    let pathBtn = '';
    if (path) {
      const btnId = `cp-${severity}-${i}-${Math.random().toString(36).slice(2,8)}`;
      pathBtn = `
        <button id="${btnId}"
          onclick="event.stopPropagation(); copyToClipboard('${escapeHTML(path)}', '${btnId}')"
          title="${escapeHTML(path)}"
          style="background: var(--bg-alt); border: 1px solid var(--border); color: var(--text-muted); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-family: var(--font-mono); font-size: 11px; white-space: nowrap;">
          📋 copy path
        </button>`;
    }
    return `
      <tr>
        <td style="padding:8px 10px; border-bottom: 1px solid var(--border);"><span class="badge ${cls}">${escapeHTML(it.kind || '?')}</span></td>
        <td style="padding:8px 10px; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 12px;">${escapeHTML(it.id || '?')}${reason}</td>
        <td style="padding:8px 10px; border-bottom: 1px solid var(--border); text-align: right;">${pathBtn}</td>
      </tr>
    `;
  }).join('');
}

function renderContractSection() {
  const sec = document.getElementById('contract-section');
  if (!sec) return;

  // 端点不可用 / 本 change 没 pact → 整个区块不渲染
  if (!contractDetail || !contractDetail.available) {
    sec.style.display = 'none';
    sec.innerHTML = '';
    return;
  }

  const d = contractDetail;
  const adapter = d.adapter || '?';
  const ver = d.adapter_version ? `@${d.adapter_version}` : '';

  // 顶部头：状态 + adapter + 全局 copy adapter.yaml 按钮
  const adapterBtnId = 'cp-adapter-' + Math.random().toString(36).slice(2,8);
  let adapterBtn = '';
  if (d.adapter_path) {
    adapterBtn = `<button id="${adapterBtnId}"
      onclick="copyToClipboard('${escapeHTML(d.adapter_path)}', '${adapterBtnId}')"
      title="${escapeHTML(d.adapter_path)}"
      style="background: var(--bg-alt); border: 1px solid var(--border); color: var(--text-muted); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: var(--font-mono); font-size: 11px;">
      📋 copy adapter.yaml path
    </button>`;
  }

  // 三段：violations / warnings / satisfied (后者默认折叠)
  const vRows = rowsHTML(d.violations, 'error');
  const wRows = rowsHTML(d.warnings, 'warn');
  const sRows = rowsHTML(d.satisfied, 'ok');

  // 折叠满足项以免淹没违规
  const sCount = (d.satisfied || []).length;
  const satisfiedBlock = sCount > 0 ? `
    <details style="margin-top: 16px;">
      <summary style="cursor: pointer; color: var(--text-muted); font-size: 13px; padding: 6px 0;">
        ✓ ${sCount} satisfied (展开查看)
      </summary>
      <table style="width: 100%; border-collapse: collapse; margin-top: 8px;">
        <thead>
          <tr style="text-align:left; color: var(--text-muted); font-size: 12px;">
            <th style="padding:6px 10px; border-bottom: 1px solid var(--border); width: 110px;">kind</th>
            <th style="padding:6px 10px; border-bottom: 1px solid var(--border);">id</th>
            <th style="padding:6px 10px; border-bottom: 1px solid var(--border); width: 130px;"></th>
          </tr>
        </thead>
        <tbody>${sRows}</tbody>
      </table>
    </details>
  ` : '';

  const violatedBlock = (d.violations && d.violations.length > 0) ? `
    <h3 style="margin: 18px 0 8px 0; font-size: 14px;">✗ Broken (${d.summary.violations})</h3>
    <table style="width: 100%; border-collapse: collapse;">
      <thead>
        <tr style="text-align:left; color: var(--text-muted); font-size: 12px;">
          <th style="padding:6px 10px; border-bottom: 1px solid var(--border); width: 110px;">kind</th>
          <th style="padding:6px 10px; border-bottom: 1px solid var(--border);">id / reason</th>
          <th style="padding:6px 10px; border-bottom: 1px solid var(--border); width: 130px;"></th>
        </tr>
      </thead>
      <tbody>${vRows}</tbody>
    </table>
  ` : '';

  const warnedBlock = (d.warnings && d.warnings.length > 0) ? `
    <h3 style="margin: 18px 0 8px 0; font-size: 14px;">! Warnings (${d.summary.warnings})</h3>
    <table style="width: 100%; border-collapse: collapse;">
      <thead>
        <tr style="text-align:left; color: var(--text-muted); font-size: 12px;">
          <th style="padding:6px 10px; border-bottom: 1px solid var(--border); width: 110px;">kind</th>
          <th style="padding:6px 10px; border-bottom: 1px solid var(--border);">id / reason</th>
          <th style="padding:6px 10px; border-bottom: 1px solid var(--border); width: 130px;"></th>
        </tr>
      </thead>
      <tbody>${wRows}</tbody>
    </table>
  ` : '';

  sec.innerHTML = `
    <a id="contract"></a>
    <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px;">
      <div style="display:flex; align-items:center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
        <div style="display:flex; align-items:center; gap: 10px;">
          <h2 style="margin: 0; font-size: 16px;">Contract</h2>
          ${statusBadgeContract(d.status)}
          <span class="muted" style="font-size: 13px;">vs ${escapeHTML(adapter)}${escapeHTML(ver)}</span>
        </div>
        ${adapterBtn}
      </div>
      <div style="color: var(--text-muted); font-size: 12px; margin-top: 6px;">
        ${d.summary.violations} broken · ${d.summary.warnings} warn · ${d.summary.satisfied} satisfied
      </div>
      ${violatedBlock}
      ${warnedBlock}
      ${satisfiedBlock}
    </div>
  `;
  sec.style.display = '';

  // URL fragment 是 #contract → 自动滚到本卡片（首次进入或来自 index 的角标点击）
  if (location.hash === '#contract') {
    setTimeout(() => sec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
}

function categorize(e) {
  if (e.event && e.event.startsWith('artifact.')) return 'artifact';
  if (e.event === 'gate.eval' || e.event === 'gate.start' || e.event === 'check.run' ||
      e.event === 'smoke.boot' || e.event === 'smoke.ready' || e.event === 'smoke.shutdown' || e.event === 'smoke.skip') return 'gate';
  return 'business';
}

function eventRowHTML(e, globalIdx, { justAppended = false } = {}) {
  const r = renderEvent(e);
  const critical = isCritical(e);
  const cat = categorize(e);
  const cls = ['event'];
  if (critical) cls.push('critical');
  if (justAppended) cls.push('just-appended');
  return `
    <div class="${cls.join(' ')}" data-idx="${globalIdx}" data-cat="${cat}" onclick="togglePayload(${globalIdx})">
      <span class="event-ts">${fmtTs(e.ts)}</span>
      <span class="event-phase badge badge-${phaseColor(e.phase)}">${e.phase || '—'}</span>
      <span class="event-title"><span class="event-icon ${r.cls}">${r.icon}</span> ${r.title}</span>
      <span class="dim">${e.actor ? e.actor.split(':')[1]?.split('@')[0] || '' : ''}</span>
    </div>
    <div class="event-payload" id="payload-${globalIdx}">
      ${Object.entries(e.data || {}).map(([k, v]) =>
        `<div class="event-payload-row"><span class="event-payload-key">${k}:</span><span class="event-payload-val">${formatPayloadValue(v)}</span></div>`
      ).join('') || '<span class="dim">(no payload)</span>'}
    </div>
  `;
}

function formatPayloadValue(v) {
  if (v === null || v === undefined) return '<span class="dim">null</span>';
  if (typeof v === 'object') return JSON.stringify(v, null, 2);
  return String(v);
}

function phaseColor(p) {
  const m = { 'SPEC':'purple','PLAN':'blue','IMPLEMENT':'blue','VERIFY':'yellow','SMOKE':'yellow','OBSERVE':'green','ARCHIVE':'gray' };
  return m[p] || 'gray';
}

window.togglePayload = function(idx) {
  const el = document.getElementById(`payload-${idx}`);
  if (el) el.classList.toggle('open');
};

function refreshHeader() {
  if (allEvents.length === 0) {
    document.getElementById('change-sub').textContent = 'events.jsonl 为空或不存在';
    return;
  }
  const agg = aggregateChange(allEvents);
  document.getElementById('change-sub').textContent = `${agg.total_events} events · stage ${agg.stage}`;
  document.getElementById('info-grid').innerHTML = renderInfoCards(agg);
  document.getElementById('stage-row').innerHTML = renderStagePipeline(agg);
  document.getElementById('event-count').textContent = `(${allEvents.length})`;
}

function renderAll() {
  // 最新在上；data-idx 用全局索引（allEvents 位置）保持稳定
  const html = [];
  for (let i = allEvents.length - 1; i >= 0; i--) {
    html.push(eventRowHTML(allEvents[i], i));
  }
  document.getElementById('events').innerHTML = html.join('');
  applyFilters();
}

function prependNewEvents(newEvs) {
  // 新事件 push 到 allEvents 末尾，DOM 前插入
  const container = document.getElementById('events');
  const fragments = [];
  const firstIdx = allEvents.length;
  for (let k = newEvs.length - 1; k >= 0; k--) {
    // 倒序插入到 DOM 最前，保持"最新在上"
    const globalIdx = firstIdx + k;
    fragments.push(eventRowHTML(newEvs[k], globalIdx, { justAppended: true }));
  }
  // 更新底层数组（按时序）
  for (const e of newEvs) allEvents.push(e);

  // 插入 DOM 前面
  const wrap = document.createElement('div');
  wrap.innerHTML = fragments.join('');
  // reverse 顺序插入：fragments 已是"新→旧"，直接整体 prepend
  const nodes = Array.from(wrap.children);
  const ref = container.firstChild;
  for (const node of nodes) {
    container.insertBefore(node, ref);
  }
  // 1.2s 后去掉闪烁 class
  setTimeout(() => {
    nodes.forEach(n => n.classList?.remove?.('just-appended'));
  }, 1400);

  applyFilters();
}

let filters = null;
function setupFilters() {
  if (filters) return;  // 已注册
  filters = {
    artifact: document.getElementById('flt-artifact'),
    business: document.getElementById('flt-business'),
    gate: document.getElementById('flt-gate'),
  };
  Object.values(filters).forEach(cb => cb.addEventListener('change', applyFilters));
}
function applyFilters() {
  if (!filters) return;
  const a = filters.artifact.checked, b = filters.business.checked, g = filters.gate.checked;
  document.querySelectorAll('.event').forEach(el => {
    const c = el.dataset.cat;
    const show = (c === 'artifact' && a) || (c === 'business' && b) || (c === 'gate' && g);
    el.style.display = show ? '' : 'none';
    const pl = document.getElementById(`payload-${el.dataset.idx}`);
    if (pl && !show) pl.classList.remove('open');
  });
}

async function main() {
  const idx = await loadIndex();
  const change = idx.changes.find(c => c.id === changeId);
  document.getElementById('change-title').textContent = changeId;
  document.getElementById('brand-meta').textContent = `/ ${changeId}`;
  setupFilters();

  // 先抓一次 contract detail（独立失败：endpoint 不可用不影响 timeline）
  await refreshContractDetail();
  renderContractSection();

  // 先尝试 live reload
  liveMode = await probeLiveReload();

  if (liveMode) {
    // live 模式：订阅 SSE，snapshot 就是初始数据
    badge.set('connecting');
    subscribeChange(changeId, {
      onStatus: (s) => {
        if (s === 'open') badge.set('on');
        else if (s === 'error') badge.set('error');
        else if (s === 'connecting') badge.set('connecting');
      },
      onSnapshot: (events) => {
        allEvents = events.slice();
        refreshHeader();
        renderAll();
        // 自动滚到首个关键事件
        const firstCritIdx = [...allEvents].reverse().findIndex(isCritical);
        if (firstCritIdx >= 0) {
          setTimeout(() => {
            const el = document.querySelector(`.event[data-idx="${allEvents.length - 1 - firstCritIdx}"]`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 300);
        }
      },
      onAppend: (events) => {
        prependNewEvents(events);
        refreshHeader();
        // ARCHIVE auto-aggregate 通常会触发新 adapter.use 事件 → 顺便刷 contract
        refreshContractDetail().then(renderContractSection);
      },
      onReset: () => {
        allEvents = [];
        document.getElementById('events').innerHTML = '';
        refreshHeader();
      },
      onMissing: () => {
        document.getElementById('events').innerHTML = '';
        document.getElementById('change-sub').textContent = 'events.jsonl 不存在（等待写入…）';
      },
    });
  } else {
    // 降级：一次性静态加载（保留 v1.3.0 行为）
    badge.set('off');
    if (!change) {
      document.getElementById('change-title').textContent = `${changeId} (not found)`;
      return;
    }
    allEvents = await loadEvents(change.trace_path);
    if (allEvents.length === 0) {
      document.getElementById('change-sub').textContent = 'events.jsonl 为空或不存在';
      return;
    }
    refreshHeader();
    renderAll();
    const firstCritIdx = [...allEvents].reverse().findIndex(isCritical);
    if (firstCritIdx >= 0) {
      setTimeout(() => {
        const el = document.querySelector(`.event[data-idx="${allEvents.length - 1 - firstCritIdx}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 300);
    }
  }
}

main();
</script>

</body>
</html>
