<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pl-pipeline · Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234f6bff'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='sans-serif' font-size='15' font-weight='800'%3Epl%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-brand-mark">pl</div>
    <span>pl-pipeline Dashboard</span>
    <span class="nav-meta" style="margin-left: 12px;">v1.3 observe</span>
    <span id="live-badge-slot"></span>
  </div>
  <button class="theme-toggle" id="theme-toggle" title="切换主题">
    <span id="theme-icon">☀</span>
  </button>
</nav>

<div class="page">
  <h1 class="page-title">Changes</h1>
  <p class="page-sub">项目里所有变更（change）的当前状态。点击卡片查看完整 trace。</p>

  <div id="contract-summary-slot"></div>
  <div id="grid" class="grid"></div>

  <div id="empty" class="empty" style="display:none">
    <div class="empty-icon">📭</div>
    <div>还没有 change 产出 events</div>
    <div class="muted" style="margin-top: 8px; font-size: 12px">
      运行 <code>bash $PL_HOME/scripts/pl-observe.sh --change &lt;id&gt;</code> 开始观察
    </div>
  </div>
</div>

<script type="module">
import { parseJSONL, aggregateChange, STAGES, stageStatus, fmtRelative } from './assets/parser.js';
import { initTheme } from './assets/theme.js';
import { probeLiveReload, subscribeIndex, mountStatusBadge } from './assets/live.js';

initTheme();

const badge = mountStatusBadge(document.getElementById('live-badge-slot'));

// change_id -> { tracePath, mtime, size, agg }
const changeCache = new Map();

// change_id -> { status, adapter, adapter_version, broken_count, warn_count, broken_examples, warn_examples }
// 由 /_data/contracts.json 填充；端点不可用时为空对象（卡片就不显示 contract badge）
let contractStatus = {};
let contractSummary = null;     // { total, satisfied, warn, broken } 或 null
let contractAvailable = false;

async function loadIndex() {
  try {
    const resp = await fetch('./_data.json');
    if (!resp.ok) throw new Error('no _data.json');
    return await resp.json();
  } catch {
    return { changes: [] };
  }
}

async function loadChangeEvents(tracePath) {
  const resp = await fetch(tracePath, { cache: 'no-store' });
  if (!resp.ok) return [];
  const text = await resp.text();
  return parseJSONL(text);
}

// /_data/contracts.json 取每个 change 的 pact verify 状态
// 端点 404 / 500 / 字段缺失都视为"不可用"，不影响其它视图
async function refreshContractStatus() {
  try {
    const resp = await fetch('/_data/contracts.json', { cache: 'no-store' });
    if (!resp.ok) {
      contractStatus = {}; contractSummary = null; contractAvailable = false;
      return;
    }
    const data = await resp.json();
    contractAvailable = !!data.available;
    contractStatus = data.by_change || {};
    contractSummary = data.summary || null;
  } catch {
    contractStatus = {}; contractSummary = null; contractAvailable = false;
  }
}

function renderStagePipeline(agg) {
  return STAGES.map((s, i) => {
    const status = stageStatus(agg, s);
    const arrow = i < STAGES.length - 1 ? '<div class="stage-arrow"></div>' : '';
    return `
      <div class="stage-step ${status}">
        <div class="stage-dot">${status === 'done' ? '✓' : status === 'blocked' ? '✗' : ''}</div>
        <div class="stage-label">${s}</div>
      </div>${arrow}
    `;
  }).join('');
}

function gateStatusBadge(status) {
  if (status === 'PASSED') return '<span class="badge badge-green">passed</span>';
  if (status === 'BLOCKED') return '<span class="badge badge-red">blocked</span>';
  if (status === 'SKIPPED') return '<span class="badge badge-yellow">skipped</span>';
  return '<span class="badge badge-blue">in progress</span>';
}

// 生成 contract pact 角标。无 pact / 端点不可用 → 返回空串（卡片就不挂 badge）
// 有 pact → 一个小色块 + tooltip 列出 broken/warn 的前几条 + adapter@version
// v1.7.3: 角标本身是按钮，点击直接跳到 change.html#contract drill-down
function contractBadge(changeId) {
  const info = contractStatus[changeId];
  if (!info) return '';   // 该 change 还没产 pact
  const adapter = info.adapter ? `${info.adapter}${info.adapter_version ? '@' + info.adapter_version : ''}` : '';
  let cls, label, tip;
  if (info.status === 'broken') {
    cls = 'badge-red';
    label = `pact ✗ ${info.broken_count}`;
    tip = `pact broken (${info.broken_count} violation${info.broken_count === 1 ? '' : 's'}) against ${adapter}\nclick → drill-down`;
    if (info.broken_examples && info.broken_examples.length) {
      tip += '\n  • ' + info.broken_examples.join('\n  • ');
      if (info.broken_count > info.broken_examples.length) tip += `\n  • … +${info.broken_count - info.broken_examples.length} more`;
    }
  } else if (info.status === 'warn') {
    cls = 'badge-yellow';
    label = `pact ! ${info.warn_count}`;
    tip = `pact uses deprecated capability (${info.warn_count} warning${info.warn_count === 1 ? '' : 's'}) against ${adapter}\nclick → drill-down`;
    if (info.warn_examples && info.warn_examples.length) {
      tip += '\n  • ' + info.warn_examples.join('\n  • ');
    }
  } else {
    cls = 'badge-green';
    label = 'pact ✓';
    tip = `pact satisfied against ${adapter}\nclick → drill-down`;
  }
  // 注意：badge 在 <a class="card"> 内部，需要 stopPropagation + preventDefault 把
  // "drill-down 锚点跳转"和"卡片整体跳到 timeline"区分开
  const drillUrl = `change.html?id=${encodeURIComponent(changeId)}#contract`;
  const onclick = `event.stopPropagation(); event.preventDefault(); window.location.href='${drillUrl}'; return false;`;
  return `<span class="badge ${cls}" role="button" tabindex="0" style="cursor:pointer;" `
    + `onclick="${onclick}" title="${tip.replace(/"/g, '&quot;')}">${label}</span>`;
}

// 顶部 summary：N satisfied · M warn · K broken。可点击折叠，看哪些 broken。
function renderContractSummary() {
  const slot = document.getElementById('contract-summary-slot');
  if (!slot) return;
  if (!contractAvailable || !contractSummary || contractSummary.total === 0) {
    slot.innerHTML = '';
    return;
  }
  const { satisfied, warn, broken, total } = contractSummary;
  const parts = [];
  parts.push(`<span class="badge badge-green">✓ ${satisfied} satisfied</span>`);
  if (warn > 0)   parts.push(`<span class="badge badge-yellow">! ${warn} warn</span>`);
  if (broken > 0) parts.push(`<span class="badge badge-red">✗ ${broken} broken</span>`);
  const dim = 'color: var(--text-muted); font-size: 13px;';
  slot.innerHTML = `
    <div style="display:flex; align-items:center; gap:10px; margin-bottom: 18px;">
      <span style="${dim}">CDC contracts</span>
      ${parts.join(' ')}
      <span style="${dim}">across ${total} change${total === 1 ? '' : 's'}</span>
    </div>
  `;
}

function cardHTML(agg) {
  const stageText = agg.stage;
  const cBadge = contractBadge(agg.change_id);
  return `
    <a class="card" data-change="${agg.change_id}" href="change.html?id=${encodeURIComponent(agg.change_id)}" style="color:inherit; display:block;">
      <div class="card-head">
        <h3 class="card-title">${agg.change_id}</h3>
        <div style="display:flex; gap:6px; align-items:center;">
          ${cBadge}
          ${gateStatusBadge(agg.gate_status)}
        </div>
      </div>
      <div class="card-stage">${stageText}</div>

      <div style="margin: 14px 0 10px 0;">
        <div style="display:flex; gap:4px; align-items:center;">
          ${renderStagePipeline(agg).replace(/<div class="stage-label">.*?<\/div>/g,'').replace(/min-width: 90px/g,'min-width: 32px')}
        </div>
      </div>

      <div class="card-stats">
        <span class="card-stat" title="任务">◇ ${agg.tasks_done || 0}/${agg.tasks_total || 0}</span>
        <span class="card-stat" title="事件总数">● ${agg.total_events}</span>
        ${agg.violation_count > 0 ? `<span class="card-stat" style="color:var(--red)">⚠ ${agg.violation_count}</span>` : ''}
        <span class="card-stat dim" style="margin-left:auto">${fmtRelative(agg.last_event_ts)}</span>
      </div>
    </a>
  `;
}

function upsertCard(agg) {
  const grid = document.getElementById('grid');
  const existing = grid.querySelector(`.card[data-change="${agg.change_id}"]`);
  const html = cardHTML(agg);
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  const newCard = wrap.firstElementChild;
  if (existing) {
    existing.replaceWith(newCard);
  } else {
    grid.appendChild(newCard);
    // 新卡片淡入（复用 event flash 样式思路）
    newCard.style.animation = 'event-flash 1.2s ease-out';
  }
  document.getElementById('empty').style.display = 'none';
}

function removeCard(changeId) {
  const el = document.querySelector(`#grid .card[data-change="${changeId}"]`);
  if (el) el.remove();
  if (!document.querySelector('#grid .card')) {
    document.getElementById('empty').style.display = 'block';
  }
}

async function refreshOne(changeId, tracePath) {
  const events = await loadChangeEvents(tracePath);
  if (events.length === 0) {
    // 空文件：删除卡片
    removeCard(changeId);
    changeCache.delete(changeId);
    return;
  }
  const agg = aggregateChange(events);
  if (!agg) return;
  changeCache.set(changeId, { tracePath, agg });
  upsertCard(agg);
}

async function fullRender() {
  const idx = await loadIndex();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  // 先把 contract 状态拉一次，这样首次渲染卡片时角标就在位
  await refreshContractStatus();
  renderContractSummary();

  if (!idx.changes || idx.changes.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  // 清空重建（保证顺序）
  grid.innerHTML = '';
  let shown = 0;
  for (const c of idx.changes) {
    const events = await loadChangeEvents(c.trace_path);
    if (events.length === 0) continue;
    const agg = aggregateChange(events);
    if (!agg) continue;
    changeCache.set(c.id, { tracePath: c.trace_path, agg });
    grid.insertAdjacentHTML('beforeend', cardHTML(agg));
    shown++;
  }

  empty.style.display = shown === 0 ? 'block' : 'none';
}

async function main() {
  const liveMode = await probeLiveReload();
  await fullRender();

  if (!liveMode) {
    badge.set('off');
    return;
  }

  badge.set('connecting');
  subscribeIndex({
    onStatus: (s) => {
      if (s === 'open') badge.set('on');
      else if (s === 'error') badge.set('error');
      else if (s === 'connecting') badge.set('connecting');
    },
    onUpdated: async (changes) => {
      // 收到快照：changes 是当前 trace 目录的全集
      const currentIds = new Set(changes.map(c => c.id));
      // 删除消失的
      for (const [id] of changeCache) {
        if (!currentIds.has(id)) {
          removeCard(id);
          changeCache.delete(id);
        }
      }
      // pact 可能在 ARCHIVE auto-aggregate 之后变化，跟 trace 索引绑在一起最简单
      // server 端有 3s TTL 缓存，重复 fetch 几乎零成本
      await refreshContractStatus();
      renderContractSummary();
      // refresh 所有有变化的
      for (const c of changes) {
        const cached = changeCache.get(c.id);
        const tracePath = `trace/${c.id}.events.jsonl`;
        if (!cached || cached.agg.last_event_ts === undefined ||
            c.size !== (cached._size || -1) || c.mtime !== (cached._mtime || 0)) {
          await refreshOne(c.id, tracePath);
          const v = changeCache.get(c.id);
          if (v) { v._size = c.size; v._mtime = c.mtime; }
        }
      }
    },
  });
}

main();
</script>

</body>
</html>
