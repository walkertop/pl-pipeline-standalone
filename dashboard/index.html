<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pl-pipeline · Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234f6bff'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='sans-serif' font-size='15' font-weight='800'%3Epl%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-brand-mark">pl</div>
    <span>pl-pipeline Dashboard</span>
    <span class="nav-meta" style="margin-left: 12px;">v1.3 observe</span>
    <span id="live-badge-slot"></span>
  </div>
  <button class="theme-toggle" id="theme-toggle" title="切换主题">
    <span id="theme-icon">☀</span>
  </button>
</nav>

<div class="page">
  <h1 class="page-title">Changes</h1>
  <p class="page-sub">项目里所有变更（change）的当前状态。点击卡片查看完整 trace。</p>

  <div id="grid" class="grid"></div>

  <div id="empty" class="empty" style="display:none">
    <div class="empty-icon">📭</div>
    <div>还没有 change 产出 events</div>
    <div class="muted" style="margin-top: 8px; font-size: 12px">
      运行 <code>bash $PL_HOME/scripts/pl-observe.sh --change &lt;id&gt;</code> 开始观察
    </div>
  </div>
</div>

<script type="module">
import { parseJSONL, aggregateChange, STAGES, stageStatus, fmtRelative } from './assets/parser.js';
import { initTheme } from './assets/theme.js';
import { probeLiveReload, subscribeIndex, mountStatusBadge } from './assets/live.js';

initTheme();

const badge = mountStatusBadge(document.getElementById('live-badge-slot'));

// change_id -> { tracePath, mtime, size, agg }
const changeCache = new Map();

async function loadIndex() {
  try {
    const resp = await fetch('./_data.json');
    if (!resp.ok) throw new Error('no _data.json');
    return await resp.json();
  } catch {
    return { changes: [] };
  }
}

async function loadChangeEvents(tracePath) {
  const resp = await fetch(tracePath, { cache: 'no-store' });
  if (!resp.ok) return [];
  const text = await resp.text();
  return parseJSONL(text);
}

function renderStagePipeline(agg) {
  return STAGES.map((s, i) => {
    const status = stageStatus(agg, s);
    const arrow = i < STAGES.length - 1 ? '<div class="stage-arrow"></div>' : '';
    return `
      <div class="stage-step ${status}">
        <div class="stage-dot">${status === 'done' ? '✓' : status === 'blocked' ? '✗' : ''}</div>
        <div class="stage-label">${s}</div>
      </div>${arrow}
    `;
  }).join('');
}

function gateStatusBadge(status) {
  if (status === 'PASSED') return '<span class="badge badge-green">passed</span>';
  if (status === 'BLOCKED') return '<span class="badge badge-red">blocked</span>';
  if (status === 'SKIPPED') return '<span class="badge badge-yellow">skipped</span>';
  return '<span class="badge badge-blue">in progress</span>';
}

function cardHTML(agg) {
  const stageText = agg.stage;
  return `
    <a class="card" data-change="${agg.change_id}" href="change.html?id=${encodeURIComponent(agg.change_id)}" style="color:inherit; display:block;">
      <div class="card-head">
        <h3 class="card-title">${agg.change_id}</h3>
        ${gateStatusBadge(agg.gate_status)}
      </div>
      <div class="card-stage">${stageText}</div>

      <div style="margin: 14px 0 10px 0;">
        <div style="display:flex; gap:4px; align-items:center;">
          ${renderStagePipeline(agg).replace(/<div class="stage-label">.*?<\/div>/g,'').replace(/min-width: 90px/g,'min-width: 32px')}
        </div>
      </div>

      <div class="card-stats">
        <span class="card-stat" title="任务">◇ ${agg.tasks_done || 0}/${agg.tasks_total || 0}</span>
        <span class="card-stat" title="事件总数">● ${agg.total_events}</span>
        ${agg.violation_count > 0 ? `<span class="card-stat" style="color:var(--red)">⚠ ${agg.violation_count}</span>` : ''}
        <span class="card-stat dim" style="margin-left:auto">${fmtRelative(agg.last_event_ts)}</span>
      </div>
    </a>
  `;
}

function upsertCard(agg) {
  const grid = document.getElementById('grid');
  const existing = grid.querySelector(`.card[data-change="${agg.change_id}"]`);
  const html = cardHTML(agg);
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  const newCard = wrap.firstElementChild;
  if (existing) {
    existing.replaceWith(newCard);
  } else {
    grid.appendChild(newCard);
    // 新卡片淡入（复用 event flash 样式思路）
    newCard.style.animation = 'event-flash 1.2s ease-out';
  }
  document.getElementById('empty').style.display = 'none';
}

function removeCard(changeId) {
  const el = document.querySelector(`#grid .card[data-change="${changeId}"]`);
  if (el) el.remove();
  if (!document.querySelector('#grid .card')) {
    document.getElementById('empty').style.display = 'block';
  }
}

async function refreshOne(changeId, tracePath) {
  const events = await loadChangeEvents(tracePath);
  if (events.length === 0) {
    // 空文件：删除卡片
    removeCard(changeId);
    changeCache.delete(changeId);
    return;
  }
  const agg = aggregateChange(events);
  if (!agg) return;
  changeCache.set(changeId, { tracePath, agg });
  upsertCard(agg);
}

async function fullRender() {
  const idx = await loadIndex();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  if (!idx.changes || idx.changes.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  // 清空重建（保证顺序）
  grid.innerHTML = '';
  let shown = 0;
  for (const c of idx.changes) {
    const events = await loadChangeEvents(c.trace_path);
    if (events.length === 0) continue;
    const agg = aggregateChange(events);
    if (!agg) continue;
    changeCache.set(c.id, { tracePath: c.trace_path, agg });
    grid.insertAdjacentHTML('beforeend', cardHTML(agg));
    shown++;
  }

  empty.style.display = shown === 0 ? 'block' : 'none';
}

async function main() {
  const liveMode = await probeLiveReload();
  await fullRender();

  if (!liveMode) {
    badge.set('off');
    return;
  }

  badge.set('connecting');
  subscribeIndex({
    onStatus: (s) => {
      if (s === 'open') badge.set('on');
      else if (s === 'error') badge.set('error');
      else if (s === 'connecting') badge.set('connecting');
    },
    onUpdated: async (changes) => {
      // 收到快照：changes 是当前 trace 目录的全集
      const currentIds = new Set(changes.map(c => c.id));
      // 删除消失的
      for (const [id] of changeCache) {
        if (!currentIds.has(id)) {
          removeCard(id);
          changeCache.delete(id);
        }
      }
      // refresh 所有有变化的
      for (const c of changes) {
        const cached = changeCache.get(c.id);
        const tracePath = `trace/${c.id}.events.jsonl`;
        if (!cached || cached.agg.last_event_ts === undefined ||
            c.size !== (cached._size || -1) || c.mtime !== (cached._mtime || 0)) {
          await refreshOne(c.id, tracePath);
          const v = changeCache.get(c.id);
          if (v) { v._size = c.size; v._mtime = c.mtime; }
        }
      }
    },
  });
}

main();
</script>

</body>
</html>
