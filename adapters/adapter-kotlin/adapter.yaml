apiVersion: pl.dev/v1
kind: Adapter

metadata:
  id: kotlin
  name: Kotlin 通用项目适配器
  description: >
    面向 Kotlin 项目（JVM / KMP / Android / Native）的 pl-pipeline 适配器。
    提供 Kotlin 编码规范、kotlinx.serialization 规范、kotlin-code-review skill，
    以及 gradle 构建集成。不绑定具体 UI 框架（可与 adapter-android、
    adapter-kmp-kuikly 等栈级适配器组合使用）。
  version: 0.1.0
  compatible_pl: ">=0.1.0-mvp <1.0.0"
  license: Apache-2.0
  homepage: https://github.com/walkertop/pl-pipeline-standalone
  authors:
    - name: walker
      email: bin5211bin@gmail.com
  detect:
    - file_exists: "settings.gradle.kts"
    - file_exists: "settings.gradle"
    - file_exists: "build.gradle.kts"
    - file_exists: "build.gradle"
    - file_exists: "pom.xml"  # Maven Kotlin 项目

provides:
  skills:
    - id: kotlin-code-review
      path: "skills/kotlin-code-review/SKILL.md"
      triggers:
        - "kotlin 代码审查"
        - "审查 kotlin 代码"
        - "kotlin code review"
        - "review kotlin code"
      description: "基于 Kotlin 官方规范 + 业界最佳实践做全面代码审查"
  rules:
    - id: kotlin-coding-standards
      path: "rules/kotlin-coding-standards.md"
      scope: always
      description: "Kotlin 编码规范（命名/类型安全/不可变/协程等）"
    - id: kotlinx-serialization
      path: "rules/kotlinx-serialization.md"
      scope: on-demand
      description: "kotlinx.serialization 使用规范（@Serializable / 默认值 / @Contextual）"
  scripts:
    build: "scripts/build.sh"
    verify: "scripts/verify.sh"
    lint: "scripts/lint.sh"
  build_adapter:
    type: gradle
    commands:
      compile_check:
        cmd: "./gradlew compileKotlin --quiet"
        success_pattern: "BUILD SUCCESSFUL"
        failure_patterns:
          - "BUILD FAILED"
          - "e: .*: .*"        # Kotlin 编译错误形如 "e: File.kt:12: ..."
        timeout_sec: 300
      lint:
        cmd: "./gradlew detekt --continue"
        success_pattern: "BUILD SUCCESSFUL"
        timeout_sec: 180
      test:
        cmd: "./gradlew test --continue"
        timeout_sec: 600
      full_build:
        cmd: "./gradlew build --continue"
        timeout_sec: 900

  # v1.7 (CDC)：稳定的对外能力承诺，与具体 skill/build_command 名解耦。
  # kotlin adapter 是"通用 Kotlin 项目"层，能力面相对小，主要由 build chain 撑起。
  capabilities:
    # ---- build chain ----
    - id: typecheck
      backed_by:
        build_command: compile_check
      since: "0.1.0"
    - id: lint
      backed_by:
        build_command: lint
      since: "0.1.0"
    - id: test
      backed_by:
        build_command: test
      since: "0.1.0"
    - id: full-build
      backed_by:
        build_command: full_build
      since: "0.1.0"

    # ---- 语义能力（skill / rule 支撑）----
    - id: code-review
      backed_by:
        skill: kotlin-code-review
      since: "0.1.0"
    - id: coding-standards
      backed_by:
        rule: kotlin-coding-standards
      since: "0.1.0"
    - id: serialization-conventions
      backed_by:
        rule: kotlinx-serialization
      since: "0.1.0"

    # ---- 显式声明不支持（避免静默） ----
    - id: smoke-probe
      backed_by: null
      since: "0.1.0"
      reason: |
        kotlin adapter 是通用层，不绑定具体运行时（JVM service / Android app / KMP）。
        smoke probe 应由栈级 adapter（如 adapter-android、adapter-ktor-server）提供。
    - id: dependency-injection
      backed_by: null
      since: "0.1.0"
      reason: |
        kotlin 没有官方 DI 标准。Koin / Hilt / 手写 constructor injection 各有适用场景。
        consumer 若需要 DI 能力，请显式选用栈级 adapter（如 adapter-android 提供 hilt）。

requires:
  tools:
    - name: java
      min_version: "17"
      install_hint: "brew install openjdk@17 或 sdkman install java 17"
    - name: gradle
      min_version: "8.0"
      install_hint: "项目自带 gradlew 即可，无需全局安装"
  files:
    - path: "settings.gradle.kts"
      alt_paths: ["settings.gradle", "pom.xml"]

contract:
  expected_files:
    - path: build.gradle.kts
      alt_paths: ["build.gradle", "pom.xml"]
      severity: error
    - path: gradle/wrapper/gradle-wrapper.properties
      severity: warn
      note: "推荐使用 gradle wrapper，避免团队 gradle 版本不一致"
    - path: gradle.properties
      severity: warn
      note: "包含 JVM 参数 / KMP 配置等关键设定"

piao_emit:
  on_stages: [VERIFY, ARCHIVE]
  urn_namespace: "urn:piao:artifact:pl:kotlin"
