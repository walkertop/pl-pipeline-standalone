apiVersion: pl.dev/v1
kind: Adapter

metadata:
  id: python-fastapi
  name: Python FastAPI 后端全家桶
  description: >
    面向 Python 3.11+ / FastAPI / Pydantic v2 / SQLAlchemy 2.x / pytest 的
    pl-pipeline 适配器。提供 REST API 场景的 spec/plan/taskdag 模板、
    依赖注入/Pydantic/异步 ORM skills、类型/命名/错误处理 rules、以及
    build/verify/lint 三件套脚本。
  version: 0.1.0
  compatible_pl: ">=0.1.0-mvp <1.0.0"
  compatible_piao: ">=0.1.0"
  license: Apache-2.0
  homepage: https://github.com/walkertop/pl-pipeline-standalone
  authors:
    - name: walker
      email: bin5211bin@gmail.com
  detect:
    - file_exists: "pyproject.toml"
    - pyproject_has: "fastapi"

provides:
  templates:
    spec: "templates/spec.md"
    plan: "templates/plan.md"
    taskdag: "templates/taskdag.md"
  agents:
    - path: "agents/fastapi-architect.md"
      id: fastapi-architect
      ide_support: [codebuddy, cursor, claude-code]
      description: "FastAPI 后端架构师：路由/依赖注入/数据模型/事务边界"
    - path: "agents/fastapi-reviewer.md"
      id: fastapi-reviewer
      ide_support: [codebuddy, cursor, claude-code]
      description: "FastAPI 代码审查员：类型/安全/性能/OpenAPI 契约"
  skills:
    - id: fastapi-dependency-injection
      path: "skills/fastapi-dependency-injection.md"
      triggers: ["depends", "dependency", "di", "fastapi depends"]
      description: "FastAPI Depends 依赖注入模式与生命周期"
    - id: pydantic-v2-patterns
      path: "skills/pydantic-v2-patterns.md"
      triggers: ["pydantic", "basemodel", "validator", "field_validator"]
      description: "Pydantic v2 数据建模、校验、序列化"
    - id: sqlalchemy-async
      path: "skills/sqlalchemy-async.md"
      triggers: ["sqlalchemy", "async session", "asyncpg", "alembic"]
      description: "SQLAlchemy 2.x 异步会话与事务模式"
    - id: pytest-async
      path: "skills/pytest-async.md"
      triggers: ["pytest", "pytest-asyncio", "httpx", "test client"]
      description: "pytest + httpx 异步测试模式"
  rules:
    - id: python-typing-strict
      path: "rules/python-typing-strict.md"
      scope: always
      description: "Python 类型注解强制与 mypy/pyright 约束"
    - id: fastapi-conventions
      path: "rules/fastapi-conventions.md"
      scope: always
      description: "路由组织、status_code、response_model、错误处理约定"
    - id: api-error-handling
      path: "rules/api-error-handling.md"
      scope: on-demand
      description: "API 错误分类、HTTP status 与 problem+json"
    - id: fastapi-no-sync-blocking-in-async
      path: "rules/fastapi-no-sync-blocking-in-async.md"
      scope: always
      description: "async 代码里禁止同步阻塞调用（retro-v2 E3 · 可执行 rule）"
      executable: true
    - id: fastapi-depends-pass-callable
      path: "rules/fastapi-depends-pass-callable.md"
      scope: always
      description: "Depends(foo) 而不是 Depends(foo())（retro-v2 E3 · 可执行 rule）"
      executable: true
  scripts:
    build: "scripts/build.sh"
    verify: "scripts/verify.sh"
    lint: "scripts/lint.sh"
  build_adapter:
    type: uv
    commands:
      compile_check:
        cmd: "uv run python -c 'import py_compile, pathlib; [py_compile.compile(str(p), doraise=True) for p in pathlib.Path(\"app\").rglob(\"*.py\")]'"
        success_pattern: "^$"
        timeout_sec: 60
      lint: "uv run ruff check ."
      test: "uv run pytest -q"
      full_build:
        cmd: "uv sync && uv run python -m compileall app"
        timeout_sec: 300
    smoke:
      start_cmd: "uv run uvicorn app.main:app --host 127.0.0.1 --port $SMOKE_PORT"
      ready_url: "http://127.0.0.1:$SMOKE_PORT/health"
      ready_timeout_sec: 20
      shutdown_grace_sec: 2
      probes:
        - id: register_happy
          method: POST
          url: "/auth/register"
          headers:
            content-type: "application/json"
          body: '{"email":"smoke@test.com","password":"password1"}'
          expect_status: 201
        - id: register_duplicate
          method: POST
          url: "/auth/register"
          headers:
            content-type: "application/json"
          body: '{"email":"smoke@test.com","password":"password1"}'
          expect_status: 409
        - id: list_unauthorized
          method: GET
          url: "/api/v1/users"
          expect_status: 401

  # v1.7 (CDC)：consumer 应当对 capability 而非具体 skill/build_command 名签约。
  # 这些是 adapter 对外的"能力承诺"——内部资产可改名/重组而不破坏 consumer。
  # 详见 docs/guides/adapter-authoring.md 第 11 节。
  capabilities:
    # ---- build chain（自动化检查）----
    - id: typecheck
      backed_by:
        build_command: compile_check
      since: "0.1.0"
    - id: lint
      backed_by:
        build_command: lint
      since: "0.1.0"
    - id: test
      backed_by:
        build_command: test
      since: "0.1.0"
    - id: full-build
      backed_by:
        build_command: full_build
      since: "0.1.0"

    # ---- 语义能力（skill 支撑）----
    - id: dependency-injection
      backed_by:
        skill: fastapi-dependency-injection
      since: "0.1.0"
    - id: data-validation
      backed_by:
        skill: pydantic-v2-patterns
      since: "0.1.0"
    - id: async-orm
      backed_by:
        skill: sqlalchemy-async
      since: "0.1.0"
    - id: async-test-harness
      backed_by:
        skill: pytest-async
      since: "0.1.0"

    # ---- 语义能力（rule 支撑）----
    - id: strict-typing
      backed_by:
        rule: python-typing-strict
      since: "0.1.0"
    - id: api-error-handling
      backed_by:
        rule: api-error-handling
      since: "0.1.0"

    # ---- smoke probe（fastapi 真支持，与 nextjs 不同）----
    - id: smoke-probe
      backed_by:
        # fastapi 进程启动可控、端点健康，可跑 HTTP probe；不需要 backed_by 单一资产，
        # 由 build_adapter.smoke.probes 整体支撑。这里用占位指向 build_adapter 段。
        config: "build_adapter.smoke.probes"
      since: "0.1.0"

requires:
  tools:
    - name: python3
      min_version: "3.11"
      install_hint: "brew install python@3.12 或 pyenv install 3.12"
    - name: uv
      install_hint: "curl -LsSf https://astral.sh/uv/install.sh | sh"
  files:
    - pyproject.toml

# v1.1 新增（retro-v2 E4）：给 piao-contract-drift-compute 消费的"声明侧契约"
# 描述宿主项目**应该**满足的状态。drift 引擎会采集宿主实况做对比。
contract:
  expected_files:
    - path: pyproject.toml
      severity: error
      note: "Python 项目元数据"
    - path: app/main.py
      severity: error
      note: "FastAPI 入口"
    - path: tests/
      kind: dir
      severity: warn
      note: "最小测试目录，缺失可能导致 pytest 集成漏测"
  peer_versions:
    python:
      python: ">=3.11"
      fastapi: ">=0.110"
      pydantic: ">=2.0"
      sqlalchemy: ">=2.0"
      # 关键点：显式要求 bcrypt 不高于 5.x 避开 passlib 坏 combo（本次 retro-v2 B7）
      bcrypt: ">=4.0,<5.0"
      uvicorn: ">=0.20"
      # 这两个是"真跑 demo 才发现需要"的运行时依赖（retro-v2 B6）
      python-multipart: ">=0.0.9"
      email-validator: ">=2.0"
  known_bad_combos:
    - id: passlib-vs-bcrypt-5
      when:
        python:
          passlib: "*"
          bcrypt: ">=5.0"
      severity: error
      message: |
        passlib 对 bcrypt>=5.x 有已知 AttributeError / 72 字节 bug。
        本 adapter 推荐直接使用 bcrypt 库而非 passlib。

piao_emit:
  on_stages: [VERIFY, ARCHIVE]
  urn_namespace: "urn:piao:artifact:pl:python-fastapi"
