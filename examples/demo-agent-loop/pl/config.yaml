version: pl@v1.1
namespace: demo-agent-loop
requires:
  pl_version: ">=1.12"
checks:
  - id: unit_tests
    label: "Python unit tests"
    cmd: "python3 -m unittest discover -s tests"
    cwd: "."
    required: true
gates:
  D:
    from: IMPLEMENT
    to: VERIFY
    eval: all_checks.pass
    on_failure: block
    checks: [unit_tests]
